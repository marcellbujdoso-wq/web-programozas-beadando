<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React CRUD - Napfény Tours</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; background-color: #f4f4f9; }
        header { background-color: #005f73; color: white; padding: 20px; text-align: center; }
        nav { background-color: #0a9396; padding: 10px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        main { flex: 1; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        footer { background-color: #001219; color: white; text-align: center; padding: 10px; margin-top: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #005f73; color: white; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 8px; margin: 5px; width: calc(30% - 20px); border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #0a9396; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin: 5px; }
        button:hover { background-color: #005f73; }
        .btn-edit { background-color: #e9c46a; color: black; padding: 5px 10px; margin-right: 5px; }
        .btn-delete { background-color: #e76f51; padding: 5px 10px; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
    </header>

    <nav>
        <a href="index.html">Főoldal</a>
        <a href="javascript.html">JS CRUD</a>
        <a href="react.html">React CRUD</a>
        <a href="spa.html">SPA (Játékok)</a>
        <a href="fetchapi.html">Fetch API</a>
        <a href="axios.html">Axios</a>
        <a href="oojs.html">OOJS</a>
    </nav>

    <main id="root"></main>

    <footer>
        <p>Készítette: Marcell (Neptun: E364NV) és Luca (Neptun:FLVPP9)</p>
    </footer>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [szallodak, setSzallodak] = useState([
                { az: 'BS', nev: 'Baron Resort', besorolas: '5' },
                { az: 'CL', nev: 'Charm Life', besorolas: '3' },
                { az: 'CP', nev: 'Cesar Palace', besorolas: '5' }
            ]);
            
            const [formData, setFormData] = useState({ az: '', nev: '', besorolas: '' });
            const [isEditing, setIsEditing] = useState(false);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.az || !formData.nev || !formData.besorolas) {
                    alert('Minden mezőt ki kell tölteni!');
                    return;
                }

                if (isEditing) {
                    setSzallodak(szallodak.map(sz => sz.az === formData.az ? formData : sz));
                    setIsEditing(false);
                } else {
                    const exists = szallodak.find(sz => sz.az === formData.az);
                    if (exists) {
                        alert('Ez az azonosító már létezik!');
                        return;
                    }
                    setSzallodak([...szallodak, formData]);
                }
                setFormData({ az: '', nev: '', besorolas: '' });
            };

            const handleEdit = (szalloda) => {
                setFormData(szalloda);
                setIsEditing(true);
            };

            const handleDelete = (az) => {
                if (window.confirm('Biztosan törlöd?')) {
                    setSzallodak(szallodak.filter(sz => sz.az !== az));
                }
            };

            return (
                <div>
                    <h2>Szállodák Kezelése (React CRUD)</h2>
                    
                    <div className="form-container">
                        <h3>{isEditing ? 'Szálloda szerkesztése' : 'Új szálloda hozzáadása'}</h3>
                        <form onSubmit={handleSubmit}>
                            <input 
                                type="text" 
                                name="az" 
                                value={formData.az} 
                                onChange={handleChange} 
                                placeholder="Azonosító (pl. XY)" 
                                disabled={isEditing}
                            />
                            <input 
                                type="text" 
                                name="nev" 
                                value={formData.nev} 
                                onChange={handleChange} 
                                placeholder="Szálloda neve" 
                            />
                            <input 
                                type="number" 
                                name="besorolas" 
                                value={formData.besorolas} 
                                onChange={handleChange} 
                                placeholder="Besorolás (csillag)" 
                            />
                            <button type="submit">{isEditing ? 'Módosítás' : 'Hozzáadás'}</button>
                            {isEditing && (
                                <button type="button" onClick={() => { setIsEditing(false); setFormData({ az: '', nev: '', besorolas: '' }); }}>
                                    Mégsem
                                </button>
                            )}
                        </form>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Azonosító</th>
                                <th>Név</th>
                                <th>Besorolás</th>
                                <th>Műveletek</th>
                            </tr>
                        </thead>
                        <tbody>
                            {szallodak.map(sz => (
                                <tr key={sz.az}>
                                    <td>{sz.az}</td>
                                    <td>{sz.nev}</td>
                                    <td>{sz.besorolas} csillag</td>
                                    <td>
                                        <button className="btn-edit" onClick={() => handleEdit(sz)}>Szerkesztés</button>
                                        <button className="btn-delete" onClick={() => handleDelete(sz.az)}>Törlés</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
